<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세특 자동생성기</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; max-width: 900px; margin: 0 auto; padding: 24px 16px; color: #222; background: #fafafa; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #777; margin-bottom: 20px; }
  details { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
  summary { cursor: pointer; font-size: 13px; font-weight: 600; color: #444; }
  .row3 { display: grid; grid-template-columns: 140px 140px 1fr auto; gap: 8px; margin-top: 10px; align-items: start; }
  .row1 { margin-top: 10px; }
  textarea, input, select { width: 100%; font-size: 14px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
  button { padding: 6px 12px; border: 1px solid #888; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; white-space: nowrap; }
  button:hover { background: #f0f0f0; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .genbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .genbar select { width: 120px; }
  .genbar button { margin-left: auto; background: #222; color: #fff; border-color: #222; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
  .card-head { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .card-head .label { font-weight: 600; color: #0b57a4; }
  .card-head .count { color: #999; }
  .card textarea { min-height: 90px; }
  .actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }
  .actions button { font-size: 12px; padding: 4px 10px; }
  .bottom-actions { display: none; gap: 8px; margin-top: 12px; }
  .status { font-size: 12px; color: #999; margin-left: 8px; }
</style>
</head>
<body>

<h1>세특 자동생성기</h1>
<div class="sub">과목 · 대단원 · 소단원을 계층적으로 등록하고, 선택한 단원에 맞춰 16가지 관점의 세부능력특기사항을 자동 생성합니다.</div>

<details open>
  <summary>0단계. 자료 일괄 등록 (형식: 과목 &gt; 대단원 &gt; 소단원, 한 줄에 하나씩)</summary>
  <div class="row1">
    <textarea id="bulkInput" rows="6" placeholder="예시)&#10;간호의 기초 > 혈액관리법 > 혈액관리법의 탐구&#10;간호의 기초 > 혈액관리법 > 수혈 간호&#10;간호의 기초 > 근골격 계통 질환 > 골절&#10;보건간호 > > 감염 관리 (대단원 없으면 이렇게 비워두세요)"></textarea>
    <div style="margin-top:6px">
      <button id="bulkAddBtn">일괄 등록</button>
      <span class="status" id="statusBulk"></span>
    </div>
  </div>
</details>

<details open>
  <summary>1단계. 과목 등록</summary>
  <div class="row1">
    <textarea id="subjectListInput" rows="2" placeholder="예: 간호의 기초, 보건간호"></textarea>
    <div style="margin-top:6px"><button id="addSubjects">과목 추가</button><span class="status" id="statusSubject"></span></div>
  </div>
</details>

<details open>
  <summary>2단계. 대단원 등록 (과목 선택 후 그 과목에 속하는 대단원 추가)</summary>
  <div class="row3">
    <select id="regSubjectForBig"></select>
    <div></div>
    <textarea id="bigUnitListInput" rows="2" placeholder="예: 혈액관리법, 근골격 계통 질환"></textarea>
    <button id="addBigUnits">대단원 추가</button>
  </div>
</details>

<details open>
  <summary>3단계. 소단원 등록 (과목 → 대단원 선택 후 소단원 추가)</summary>
  <div class="row3">
    <select id="regSubjectForSmall"></select>
    <select id="regBigUnitForSmall"></select>
    <textarea id="smallUnitListInput" rows="2" placeholder="예: 혈액관리법의 탐구, 골절"></textarea>
    <button id="addSmallUnits">소단원 추가</button>
  </div>
</details>

<div class="grid3">
  <div class="field"><label>과목명</label><select id="subjectSelect"></select></div>
  <div class="field"><label>대단원</label><select id="bigUnitSelect"></select></div>
  <div class="field"><label>소단원 / 활동명</label><select id="smallUnitSelect"></select></div>
</div>

<div class="field">
  <label style="color:#999">담당 교사 (선택사항, 저장 기록 구분용)</label>
  <input id="teacherName" type="text" placeholder="예: 김선생">
</div>

<div class="field">
  <label>핵심 개념/키워드 (쉼표로 구분)</label>
  <input id="concepts" type="text" placeholder="예: 혈액형, 수혈 부작용">
</div>

<div class="field">
  <label style="color:#999">간호 중재 / 방법 (선택사항, 비워두어도 됨)</label>
  <input id="methods" type="text" placeholder="예: 교차시험, 수혈 관찰">
</div>

<div class="genbar">
  <label style="font-size:13px">글자수 제한</label>
  <select id="limit">
    <option value="200">200자</option>
    <option value="300">300자</option>
    <option value="500" selected>500자</option>
  </select>
  <button id="genBtn">16가지 버전 생성</button>
</div>

<div id="results"></div>

<div class="bottom-actions" id="bottomActions">
  <button id="copyAllBtn">전체 복사</button>
  <button id="downloadBtn">txt 다운로드</button>
  <button id="saveAllBtn">전체 시트 저장</button>
  <span class="status" id="statusSaveAll"></span>
</div>

<script>
// ===== GAS 배포 URL =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxr8VzVE7-jLDxHPTjHCsfstGOzYuRu3sWIdWAiuqF5o_PLMk0Ui8izody2Mz4F2gGV/exec';
// ========================

const NO_BIG = '(대단원 없음)';
let data = { subjects: {} };

function splitList(raw){
  return raw.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
}

async function apiGet(){
  const res = await fetch(GAS_URL);
  return res.json();
}

async function apiPost(payload){
  await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  });
}

function rebuildHierarchy(json){
  data = { subjects: {} };
  (json.subjects || []).forEach(row => {
    const name = row[0];
    if (name && !data.subjects[name]) data.subjects[name] = { bigUnits: {} };
  });
  (json.bigUnits || []).forEach(row => {
    const [subj, big] = row;
    if (!subj || !big) return;
    if (!data.subjects[subj]) data.subjects[subj] = { bigUnits: {} };
    if (!data.subjects[subj].bigUnits[big]) data.subjects[subj].bigUnits[big] = [];
  });
  (json.smallUnits || []).forEach(row => {
    const [subj, big, small] = row;
    if (!subj || !small) return;
    const bigKey = big || NO_BIG;
    if (!data.subjects[subj]) data.subjects[subj] = { bigUnits: {} };
    if (!data.subjects[subj].bigUnits[bigKey]) data.subjects[subj].bigUnits[bigKey] = [];
    if (data.subjects[subj].bigUnits[bigKey].indexOf(small) === -1) {
      data.subjects[subj].bigUnits[bigKey].push(small);
    }
  });
  Object.keys(data.subjects).forEach(subj => {
    if (!data.subjects[subj].bigUnits[NO_BIG]) data.subjects[subj].bigUnits[NO_BIG] = [];
  });
}

function fillSelect(selectEl, items, placeholder){
  const prev = selectEl.value;
  selectEl.innerHTML = '';
  if (items.length === 0 && placeholder){
    const opt0 = document.createElement('option');
    opt0.value = ''; opt0.textContent = placeholder;
    selectEl.appendChild(opt0);
    return;
  }
  items.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    selectEl.appendChild(opt);
  });
  if (items.indexOf(prev) !== -1) selectEl.value = prev;
}

function subjectNames(){ return Object.keys(data.subjects); }
function bigUnitNames(subj){ return data.subjects[subj] ? Object.keys(data.subjects[subj].bigUnits) : []; }
function smallUnitNames(subj, big){ return (data.subjects[subj] && data.subjects[subj].bigUnits[big]) ? data.subjects[subj].bigUnits[big] : []; }

function refreshAllSubjectSelects(){
  [document.getElementById('regSubjectForBig'), document.getElementById('regSubjectForSmall'), document.getElementById('subjectSelect')]
    .forEach(sel => fillSelect(sel, subjectNames(), '과목을 먼저 등록하세요'));
  syncRegBigForSmall();
  syncMainBigUnit();
}
function syncRegBigForSmall(){
  const subj = document.getElementById('regSubjectForSmall').value;
  fillSelect(document.getElementById('regBigUnitForSmall'), bigUnitNames(subj), '대단원 없음');
}
function syncMainBigUnit(){
  const subj = document.getElementById('subjectSelect').value;
  fillSelect(document.getElementById('bigUnitSelect'), bigUnitNames(subj), '대단원 없음');
  syncMainSmallUnit();
}
function syncMainSmallUnit(){
  const subj = document.getElementById('subjectSelect').value;
  const big = document.getElementById('bigUnitSelect').value;
  fillSelect(document.getElementById('smallUnitSelect'), smallUnitNames(subj, big), '소단원을 등록하세요');
}

async function loadAndRefresh(){
  try {
    const json = await apiGet();
    rebuildHierarchy(json);
    refreshAllSubjectSelects();
  } catch(err){
    console.error(err);
    alert('데이터를 불러오지 못했습니다. GAS_URL 설정 및 배포 권한(모든 사용자)을 확인해주세요.');
  }
}

// ===== 0단계: 자료 일괄 등록 =====
function parseBulkLine(line){
  const parts = line.split('>').map(s => s.trim());
  if (parts.length === 2) return { subject: parts[0], bigUnit: '', smallUnit: parts[1] };
  if (parts.length >= 3) return { subject: parts[0], bigUnit: parts[1], smallUnit: parts[2] };
  return null;
}

document.getElementById('bulkAddBtn').addEventListener('click', async function(){
  const lines = document.getElementById('bulkInput').value
    .split('\n').map(s => s.trim()).filter(Boolean);
  const statusEl = document.getElementById('statusBulk');
  const seenSubjects = new Set();
  const seenBigUnits = new Set();

  let done = 0;
  for (const line of lines) {
    const item = parseBulkLine(line);
    if (!item || !item.subject || !item.smallUnit) continue;

    if (!seenSubjects.has(item.subject)) {
      await apiPost({ type: 'subject', name: item.subject });
      seenSubjects.add(item.subject);
    }
    if (item.bigUnit) {
      const key = item.subject + '::' + item.bigUnit;
      if (!seenBigUnits.has(key)) {
        await apiPost({ type: 'bigUnit', subject: item.subject, name: item.bigUnit });
        seenBigUnits.add(key);
      }
    }
    await apiPost({
      type: 'smallUnit',
      subject: item.subject,
      bigUnit: item.bigUnit,
      name: item.smallUnit
    });

    done++;
    statusEl.textContent = `등록 중... (${done}/${lines.length})`;
  }

  document.getElementById('bulkInput').value = '';
  await loadAndRefresh();
  statusEl.textContent = `${done}건 등록 완료`;
  setTimeout(() => statusEl.textContent = '', 2500);
});

// ===== 1~3단계: 개별 등록 =====
document.getElementById('addSubjects').addEventListener('click', async function(){
  const items = splitList(document.getElementById('subjectListInput').value);
  const statusEl = document.getElementById('statusSubject');
  statusEl.textContent = '저장 중...';
  for (const name of items) await apiPost({ type: 'subject', name });
  document.getElementById('subjectListInput').value = '';
  await loadAndRefresh();
  statusEl.textContent = '저장됨';
  setTimeout(() => statusEl.textContent = '', 1500);
});

document.getElementById('addBigUnits').addEventListener('click', async function(){
  const subj = document.getElementById('regSubjectForBig').value;
  if (!subj) return alert('과목을 먼저 등록/선택하세요.');
  const items = splitList(document.getElementById('bigUnitListInput').value);
  for (const name of items) await apiPost({ type: 'bigUnit', subject: subj, name });
  document.getElementById('bigUnitListInput').value = '';
  await loadAndRefresh();
});

document.getElementById('addSmallUnits').addEventListener('click', async function(){
  const subj = document.getElementById('regSubjectForSmall').value;
  const big = document.getElementById('regBigUnitForSmall').value || NO_BIG;
  if (!subj) return alert('과목을 먼저 등록/선택하세요.');
  const items = splitList(document.getElementById('smallUnitListInput').value);
  for (const name of items) await apiPost({ type: 'smallUnit', subject: subj, bigUnit: big === NO_BIG ? '' : big, name });
  document.getElementById('smallUnitListInput').value = '';
  await loadAndRefresh();
});

document.getElementById('regSubjectForSmall').addEventListener('change', syncRegBigForSmall);
document.getElementById('subjectSelect').addEventListener('change', syncMainBigUnit);
document.getElementById('bigUnitSelect').addEventListener('change', syncMainSmallUnit);

function koreanJoin(arr){
  arr = arr.filter(Boolean);
  if (arr.length === 0) return '';
  if (arr.length === 1) return arr[0];
  return arr.slice(0, -1).join(', ') + '과 ' + arr[arr.length - 1];
}

function conceptPhrase(concepts, unit){
  if (concepts.length === 0) return unit;
  if (concepts.length <= 2) return koreanJoin(concepts);
  return koreanJoin(concepts.slice(0, 2)) + ' 등';
}

function buildTemplates(unit, concepts, methods){
  const cFull = concepts.length ? koreanJoin(concepts) : unit;
  const cShort = conceptPhrase(concepts, unit);
  const m = koreanJoin(methods);
  const hasM = methods.length > 0;

  return [
    { label:'성취수준·근거', sentences:[
      unit+' 성취기준에 비추어 '+cShort+'에 대한 이해 정도를 다양한 활동으로 확인함.',
      '핵심 개념을 정확히 설명하고 관련 사례를 스스로 찾아 근거로 제시함.',
      hasM ? m+'을 정확한 근거를 들어 설명하며 기준 이상의 이해도를 보임.' : '질문에 대한 답변에서 개념 간 관계를 정확히 파악하고 있음을 드러냄.',
      '평가 과정에서 오개념을 스스로 발견하고 수정하며 이해를 심화함.',
      '학습 목표에 부합하는 결과물을 제출하여 성취수준을 분명히 입증함.',
      '이러한 모습을 통해 해당 영역의 핵심 역량을 안정적으로 갖추었음을 확인함.'
    ]},
    { label:'수업 참여 태도', sentences:[
      '수업 시간 내내 집중력을 유지하며 '+cShort+' 관련 활동에 성실히 참여함.',
      '교사의 질문에 즉각적으로 반응하고 스스로 추가 질문을 던지는 적극성을 보임.',
      hasM ? m+'을 다룰 때도 흐트러짐 없이 끝까지 집중하는 태도를 유지함.' : '내용이 어려워도 포기하지 않고 끝까지 이해하려는 태도를 보임.',
      '필기와 정리가 꼼꼼하여 복습 시에도 스스로 내용을 재구성할 수 있는 수준임.',
      '모둠 활동에서도 맡은 역할에 책임감을 가지고 끝까지 완수함.',
      '이러한 성실한 참여가 누적되어 학습 결과물의 완성도로 이어짐.'
    ]},
    { label:'성장·변화 과정', sentences:[
      unit+' 학습 초반 낯설어하던 모습에서 점차 능숙하게 설명하는 수준으로 성장함.',
      '처음에는 단편적 지식에 머물렀으나 '+cShort+'을 반복 학습하며 체계적으로 정리하는 능력을 갖춤.',
      hasM ? m+'을 처음엔 어려워했지만 스스로 연습하며 능숙하게 적용하는 단계에 이름.' : '스스로 오답을 분석하고 보완하며 이해의 폭을 꾸준히 넓혀감.',
      '동료와 비교하며 자신의 부족한 부분을 인지하고 개선해 나가는 모습을 보임.',
      '짧은 기간 안에 눈에 띄는 향상을 보이며 학습에 대한 자신감을 회복함.',
      '이러한 성장 과정이 이후 학습에 대한 지속적인 동기로 이어짐.'
    ]},
    { label:'심화 탐구', sentences:[
      unit+'에서 다룬 내용에 그치지 않고 '+cShort+'을 스스로 더 깊이 조사하며 탐구함.',
      '전문 자료와 실제 사례를 폭넓게 수집하여 핵심 내용을 체계적으로 정리함.',
      hasM ? m+'의 원리와 적용 시 유의점을 근거를 들어 정확히 설명함.' : '원인부터 결과까지 인과관계를 따라가며 깊이 있게 이해함.',
      '학습 중 생긴 궁금증을 스스로 질문하고 답을 찾아가는 태도를 꾸준히 유지함.',
      '탐구 결과를 자료로 제작하여 학습 결과물의 완성도를 한층 높임.',
      '이 과정에서 스스로 학습을 확장해 나가는 역량을 뚜렷이 입증함.'
    ]},
    { label:'실무 적용', sentences:[
      '이론 학습에 그치지 않고 '+cShort+'을 실제 상황에 적용해보려는 시도를 함.',
      '다양한 사례를 조사하여 실제 적용 시 고려해야 할 점을 구체적으로 파악함.',
      hasM ? m+'을 상황별로 구분하여 대응 순서를 체계적으로 정리함.' : '문제 상황을 단계별로 분석하고 해결 방안을 순서대로 도출함.',
      '자료를 다룰 때 정확성을 우선시하며 신중하게 접근하는 태도를 보임.',
      '적용 사례를 조원과 공유하며 서로의 이해도를 점검하고 보완함.',
      '실무적 감각을 익히려는 노력이 결과물 전반에 걸쳐 드러남.'
    ]},
    { label:'설명·교육 역량', sentences:[
      cShort+'에 대해 급우들이 이해하기 쉽게 풀어 설명하며 소통 능력을 발휘함.',
      '전문 용어를 일상적인 언어로 바꾸어 눈높이에 맞게 전달하는 역량을 보임.',
      hasM ? '핵심 내용을 구체적인 예시와 비유를 들어 설득력 있게 풀어냄.' : '어려운 개념도 실생활 예시와 연결하여 쉽게 설명함.',

function buildText(sentences, limit){
  let result = '';
  for (const s of sentences){
    if (!s) continue;
    if (result.length === 0) result = s;
    else if ((result + ' ' + s).length <= limit) result += ' ' + s;
    else break;
  }
  return result;
}

document.getElementById('genBtn').addEventListener('click', function(){
  const subject = document.getElementById('subjectSelect').value || '해당 과목';
  const bigUnit = document.getElementById('bigUnitSelect').value || '';
  const smallUnit = document.getElementById('smallUnitSelect').value || '이번 단원';
  const concepts = document.getElementById('concepts').value.split(',').map(s => s.trim()).filter(Boolean);
  const methods = document.getElementById('methods').value.split(',').map(s => s.trim()).filter(Boolean);
  const limit = parseInt(document.getElementById('limit').value, 10);

  const templates = buildTemplates(smallUnit, concepts, methods);
  const container = document.getElementById('results');
  container.innerHTML = '';
  container.dataset.subject = subject;
  container.dataset.bigUnit = bigUnit === NO_BIG ? '' : bigUnit;
  container.dataset.smallUnit = smallUnit;

  templates.forEach((t, idx) => {
    const text = buildText(t.sentences, limit);
    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'card-head';
    const titleSpan = document.createElement('span');
    titleSpan.className = 'label';
    titleSpan.textContent = '버전 ' + (idx + 1) + ' · ' + t.label;
    const countSpan = document.createElement('span');
    countSpan.className = 'count';
    countSpan.textContent = text.length + ' / ' + limit + '자';
    header.appendChild(titleSpan);
    header.appendChild(countSpan);

    const ta = document.createElement('textarea');
    ta.value = text;
    ta.addEventListener('input', () => countSpan.textContent = ta.value.length + ' / ' + limit + '자');

    const actions = document.createElement('div');
    actions.className = 'actions';

    const copyBtn = document.createElement('button');
    copyBtn.textContent = '복사';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(ta.value);
      copyBtn.textContent = '복사됨';
      setTimeout(() => copyBtn.textContent = '복사', 1200);
    });

    const saveBtn = document.createElement('button');
    saveBtn.textContent = '시트에 저장';
    saveBtn.addEventListener('click', async () => {
      await apiPost({
        type: 'saveRecord',
        teacher: document.getElementById('teacherName').value.trim(),
        subject: container.dataset.subject,
        bigUnit: container.dataset.bigUnit,
        smallUnit: container.dataset.smallUnit,
        version: t.label,
        content: ta.value
      });
      saveBtn.textContent = '저장됨';
      setTimeout(() => saveBtn.textContent = '시트에 저장', 1200);
    });

    actions.appendChild(copyBtn);
    actions.appendChild(saveBtn);
    card.appendChild(header);
    card.appendChild(ta);
    card.appendChild(actions);
    container.appendChild(card);
  });

  document.getElementById('bottomActions').style.display = 'flex';
});

document.getElementById('copyAllBtn').addEventListener('click', function(){
  const textareas = document.querySelectorAll('#results textarea');
  const all = [];
  textareas.forEach((ta, i) => all.push('[버전 ' + (i+1) + ']\n' + ta.value));
  navigator.clipboard.writeText(all.join('\n\n'));
});

document.getElementById('downloadBtn').addEventListener('click', function(){
  const container = document.getElementById('results');
  const textareas = document.querySelectorAll('#results textarea');
  const head = '과목: ' + (container.dataset.subject||'') +
    (container.dataset.bigUnit ? ' / 대단원: ' + container.dataset.bigUnit : '') +
    ' / 소단원: ' + (container.dataset.smallUnit||'') + '\n\n';
  const all = [head];
  textareas.forEach((ta, i) => all.push('[버전 ' + (i+1) + ']\n' + ta.value));
  const blob = new Blob([all.join('\n\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (container.dataset.subject||'') + '_' + (container.dataset.smallUnit||'sesteuk') + '_세특.txt';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('saveAllBtn').addEventListener('click', async function(){
  const container = document.getElementById('results');
  const textareas = document.querySelectorAll('#results textarea');
  const statusEl = document.getElementById('statusSaveAll');
  statusEl.textContent = '저장 중...';
  const items = Array.from(textareas).map((ta, i) => ({
    version: '버전' + (i + 1), content: ta.value
  }));
  await apiPost({
    type: 'saveRecords',
    teacher: document.getElementById('teacherName').value.trim(),
    subject: container.dataset.subject,
    bigUnit: container.dataset.bigUnit,
    smallUnit: container.dataset.smallUnit,
    items
  });
  statusEl.textContent = '전체 저장 완료';
  setTimeout(() => statusEl.textContent = '', 2000);
});
